# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml

kind: hosted
name: agent-framework-agent-basic-invocations
description: |
    CertMind multi-agent certification coaching orchestrator hosted by Foundry.
metadata:
    tags:
        - Agent Framework
        - AI Agent Hosting
        - Azure AI AgentServer
        - Invocations Protocol
        - Streaming
        - CertMind
protocols:
    - protocol: invocations
      version: 1.0.0
resources:
    cpu: "0.5"
    memory: 1Gi
environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: gpt-5-mini
    - name: AZURE_AI_MODEL_DEPLOYMENT
      value: gpt-5-mini
    - name: MICROSOFT_LEARN_MCP_URL
      value: https://learn.microsoft.com/api/mcp
    - name: CERTMIND_USE_FOUNDRY_LIVE
      value: "false"
